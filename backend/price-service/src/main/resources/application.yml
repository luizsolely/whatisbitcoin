spring:
  application:
    name: price-service

  datasource:
    url: jdbc:postgresql://localhost:5432/wib
    username: wib
    password: wib
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379

  rabbitmq:
    host: localhost
    port: 5672
    username: wib
    password: wib

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always

coingecko:
  base-url: https://api.coingecko.com/api/v3
  currency: usd

price:
  scheduler:
    interval-ms: 30000

---
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:postgresql://postgres:5432/wib

  data:
    redis:
      host: redis

  rabbitmq:
    host: rabbitmq

---
spring:
  config:
    activate:
      on-profile: render

  datasource:
    url: jdbc:postgresql://dpg-d7emvet8nd3s7393j8d0-a/wib_postgres
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate

  data:
    redis:
      url: ${REDIS_URL}

  rabbitmq:
    addresses: ${RABBITMQ_URL}
    ssl:
      enabled: true

server:
  port: ${PORT:8080}
